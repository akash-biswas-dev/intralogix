spring:
  application:
    name: gateway
  config:
    import: optional:configserver:${spring.cloud.config.uri}
  cloud:
    # Configure cors for all the services/ Global cors configuration.
    gateway:
      server:
        webflux:
          global-cors:
            cors-configurations:
              '[/**]':
                allowed-origins: 'http://localhost:3000'
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                allow-credentials: true
                allowed-headers:
                  - "*"
            add-to-simple-url-handler-mapping: true
    config:
      uri: http://localhost:8888
server:
  port: 9000
jwt:
