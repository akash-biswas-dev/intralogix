services:
  # This proxy only need when running the application using docker-compose.
  proxy:
    container_name: nexus-proxy
    image: biswasakash/nexussphere-docker-proxy:latest
    ports:
      - "8000:80"
    networks:
      - proxy-network
    depends_on:
      - web
      - gateway

  web:
    container_name: nexus-web
    image: biswasakash/nexussphere-web:latest
    networks:
      - proxy-network

  # Authentication gateway for the services.
  gateway:
    container_name: nexus-gateway
    image: biswasakash/nexussphere-gateway:latest
    networks:
      - service-network
      - proxy-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - users

  users:
    container_name: nexus-users
    image: biswasakash/nexussphere-users:latest
    networks:
      - service-network
      - mongo-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - mongo

  mongo:
    container_name: nexus-mongo-docker
    image: mongo:8.0-noble
    environment:
      - MONGO_INITDB_ROOT_USERNAME=dev
      - MONGO_INITDB_ROOT_PASSWORD=password 
    ports:
      - "27017:27017"
    networks:
      - mongo-network
  postgres:
    container_name: nexus-postgres-dev
    image: postgres:18.3-bookworm
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - ./scripts/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - postgres-network


networks:
  proxy-network:
    driver: bridge
  service-network:
    driver: bridge
  mongo-network:
    driver: bridge
  postgres-network:
    driver: bridge
