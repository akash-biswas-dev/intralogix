name: Users CI pipeline

on:
  push:
    branches: ["main", "dev", "staging"]
    paths:
      - 'users/**'
      - 'common-java/**'
      - 'proto-gen-java/**'
  pull_request:
    branches: ["main", "staging"]
    paths:
      - 'users/**'
      - 'common-java/**'
      - 'proto-gen-java/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

#      Instructions to set up java on the system with version and distribution.
      - name: Setup Jdk 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven # Holds the ~/.m2 directory so for the next build no need for download dependencies.
#     Install proto-gen dependency.
      - name: Install proto gen
        run: mvn clean install -f proto-gen-java/pom.xml -DskipTests
#      Install common modules.
      - name: Install common modules
        run: mvn clean install -f common-java/pom.xml -DskipTests

      - name: Build users app
        run: mvn clean package -f users/pom.xml -DskipTests

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./users/Dockerfile
          push: false
          tags: |
            ${{ github.ref_name == 'main' && format('{0}/nexussphere-users:latest', secrets.DOCKER_USERNAME) || '' }}

            ${{ github.ref_name == 'main' && format('{0}/nexussphere-users:{1}', secrets.DOCKER_USERNAME, github.sha) || '' }}

            ${{ github.ref_name != 'main' && format('{0}/nexussphere-users:{1}', secrets.DOCKER_USERNAME, github.ref_name) || '' }}
