syntax = "proto3";

package access_manager.v1;

option java_multiple_files = true;
option java_outer_classname = "AccessManager";
option java_package = "com.biswasakashdev.nexussphere.protogen.accessmanager.v1";

message CreateSecurityGroupRequest {
  string user_id = 1;
  string workspace_id = 2;
}

message CreateSecurityGroupResponse {
  bool is_succeed = 1;
}

service AccessManagerGRPCService {
  rpc CreateSecurityGroup(CreateSecurityGroupRequest) returns (CreateSecurityGroupResponse);
}
